<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>交易记录 · 盈亏分析</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="交易记录">
  <meta name="theme-color" content="#0a0a0a">
  <link rel="apple-touch-icon" href="icon.png">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      min-height: 100vh;
      color: #e0e0e0;
      padding-top: max(10px, env(safe-area-inset-top));
      padding-bottom: calc(70px + env(safe-area-inset-bottom));
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 0 15px;
    }
    .page {
      display: none;
      padding: 10px 0;
      animation: fadeIn 0.2s ease;
    }
    .page.active {
      display: block;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .card {
      background: #141414;
      border-radius: 16px;
      padding: 18px;
      margin-bottom: 15px;
      border: 1px solid #222;
    }
    .card.compact {
      padding: 14px;
    }
    .card-title {
      font-size: 0.9rem;
      color: #888;
      margin-bottom: 15px;
      padding-bottom: 12px;
      border-bottom: 1px solid #252525;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
    }
    .card.compact .card-title {
      margin-bottom: 12px;
      padding-bottom: 10px;
    }
    .card-row {
      display: flex;
      gap: 12px;
      margin-bottom: 15px;
    }
    .card-row .card {
      flex: 1;
      margin-bottom: 0;
    }
    .btn-vertical {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .form-group {
      margin-bottom: 15px;
    }
    .form-group.compact {
      margin-bottom: 12px;
    }
    .form-group label {
      display: block;
      font-size: 0.8rem;
      color: #666;
      margin-bottom: 8px;
    }
    .form-group input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid #333;
      border-radius: 12px;
      background: #0a0a0a;
      color: #e0e0e0;
      font-size: 16px;
      transition: border-color 0.2s;
    }
    .form-group input.compact {
      padding: 12px 14px;
    }
    .form-group input:focus {
      outline: none;
      border-color: #555;
    }
    .form-group input::placeholder {
      color: #555;
    }
    .form-group input:disabled {
      background: #1a1a1a;
      color: #666;
      cursor: not-allowed;
    }
    .hint-text {
      font-size: 0.75rem;
      color: #666;
      margin-top: 6px;
    }
    .pnl-input-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .pnl-input-item {
      position: relative;
    }
    .pnl-input-item label {
      display: block;
      font-size: 0.75rem;
      color: #666;
      margin-bottom: 6px;
    }
    .pnl-input-item.profit label {
      color: #4caf50;
    }
    .pnl-input-item.loss label {
      color: #f44336;
    }
    .pnl-input-item input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #333;
      border-radius: 10px;
      background: #0a0a0a;
      color: #e0e0e0;
      font-size: 16px;
      transition: border-color 0.2s;
    }
    .pnl-input-item.profit input {
      border-color: #2a3a2a;
    }
    .pnl-input-item.profit input:focus {
      border-color: #4caf50;
    }
    .pnl-input-item.loss input {
      border-color: #3a2a2a;
      padding-left: 28px;
    }
    .pnl-input-item.loss input:focus {
      border-color: #f44336;
    }
    .loss-prefix {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: #f44336;
      font-size: 16px;
      font-weight: 600;
      margin-top: 10px;
    }
    .btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 500;
      transition: all 0.2s;
      min-height: 52px;
    }
    .btn.compact {
      padding: 12px;
      min-height: 44px;
      font-size: 0.9rem;
    }
    .btn-primary {
      background: #fff;
      color: #000;
    }
    .btn-primary:active:not(:disabled) {
      background: #ccc;
      transform: scale(0.98);
    }
    .btn-primary:disabled {
      background: #333;
      color: #666;
      cursor: not-allowed;
    }
    .btn-secondary {
      background: #252525;
      color: #e0e0e0;
    }
    .btn-secondary:active {
      background: #333;
    }
    .btn-danger {
      background: #2a1a1a;
      color: #ff6b6b;
      border: 1px solid #3a2020;
    }
    .btn-danger:active {
      background: #3a2020;
    }
    .btn-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .mode-switch {
      display: flex;
      background: #0a0a0a;
      border-radius: 12px;
      padding: 4px;
      border: 1px solid #2a2a2a;
    }
    .mode-btn {
      flex: 1;
      padding: 12px 8px;
      border: none;
      background: none;
      color: #666;
      cursor: pointer;
      border-radius: 10px;
      font-size: 0.9rem;
      transition: all 0.2s;
    }
    .mode-btn.active {
      background: #333;
      color: #fff;
    }
    .current-balance {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      padding: 16px;
      border-radius: 14px;
      text-align: center;
      margin-bottom: 15px;
      border: 1px solid #252540;
    }
    .current-balance .label {
      color: #888;
      font-size: 0.8rem;
      margin-bottom: 6px;
    }
    .current-balance .value {
      color: #fff;
      font-size: 1.6rem;
      font-weight: 700;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 8px;
    }
    .stats-grid-small {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
    }
    .stat-card {
      background: #1a1a1a;
      padding: 10px 8px;
      border-radius: 10px;
      text-align: center;
      border: 1px solid #252525;
      transition: background 0.2s;
    }
    .stat-card.main {
      padding: 12px 10px;
    }
    /* 盈亏比卡片可点击样式 */
    .stat-card.clickable {
      cursor: pointer;
      user-select: none;
    }
    .stat-card.clickable:active {
      background: #2a2a2a;
      border-color: #444;
    }
    .stat-label {
      font-size: 0.6rem;
      color: #666;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .stat-value {
      font-size: 0.85rem;
      font-weight: 600;
      color: #e0e0e0;
    }
    .stat-card.main .stat-value {
      font-size: 1rem;
    }
    .stat-value.positive { color: #4caf50; }
    .stat-value.negative { color: #f44336; }
    .chart-container {
      position: relative;
      height: 320px;
      background: #0a0a0a;
      border-radius: 12px;
      margin-top: 10px;
    }
    #chartCanvas {
      width: 100%;
      height: 100%;
    }
    .chart-tabs {
      display: flex;
      gap: 6px;
    }
    .chart-tab {
      padding: 6px 12px;
      border: 1px solid #333;
      background: none;
      color: #666;
      cursor: pointer;
      border-radius: 8px;
      font-size: 0.75rem;
      transition: all 0.2s;
    }
    .chart-tab.active {
      background: #333;
      color: #fff;
      border-color: #444;
    }
    .chart-tooltip {
      position: absolute;
      background: #1a1a1a;
      border: 1px solid #333;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 0.8rem;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      z-index: 100;
      white-space: nowrap;
    }
    .chart-tooltip.show {
      opacity: 1;
    }
    .chart-tooltip .tt-label {
      color: #888;
      font-size: 0.7rem;
    }
    .chart-tooltip .tt-value {
      font-weight: 600;
      margin-top: 4px;
      font-size: 0.95rem;
    }
    .table-wrapper {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      margin: 0 -18px;
      padding: 0 18px;
    }
    .trade-header {
      display: grid;
      grid-template-columns: 40px 1fr 70px 80px 1fr 44px;
      gap: 8px;
      padding: 10px 14px;
      background: #1a1a1a;
      border-radius: 10px;
      margin-bottom: 10px;
      border: 1px solid #252525;
      font-size: 0.75rem;
      color: #666;
      font-weight: 500;
    }
    .trade-header span {
      text-align: center;
    }
    .trade-header span:nth-child(2),
    .trade-header span:nth-child(5) {
      text-align: left;
    }
    .trade-header span:last-child {
      text-align: center;
    }
    .trade-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .trade-item {
      background: #1a1a1a;
      border-radius: 12px;
      padding: 14px;
      display: grid;
      grid-template-columns: 40px 1fr 70px 80px 1fr 44px;
      gap: 8px;
      align-items: center;
      border: 1px solid #252525;
    }
    .trade-num {
      font-size: 0.75rem;
      color: #555;
      text-align: center;
    }
    .trade-pnl {
      font-size: 1rem;
      font-weight: 600;
    }
    .trade-pnl.profit { color: #4caf50; }
    .trade-pnl.loss { color: #f44336; }
    .trade-return {
      font-size: 0.85rem;
      text-align: center;
    }
    .trade-return.profit { color: #4caf50; }
    .trade-return.loss { color: #f44336; }
    .trade-balance {
      font-size: 0.8rem;
      color: #888;
      text-align: center;
    }
    .trade-note {
      font-size: 0.75rem;
      color: #888;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .delete-btn {
      background: none;
      border: none;
      color: #555;
      cursor: pointer;
      font-size: 1.3rem;
      padding: 10px;
      border-radius: 8px;
      min-width: 44px;
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .delete-btn:active {
      color: #f44336;
      background: rgba(244,67,54,0.1);
    }
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #444;
    }
    .empty-state-icon {
      font-size: 3rem;
      margin-bottom: 15px;
    }
    .empty-state-text {
      font-size: 0.95rem;
    }
    /* 弹窗样式 */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      align-items: center;
      justify-content: center;
      z-index: 2000;
      backdrop-filter: blur(4px);
    }
    .modal-overlay.active {
      display: flex;
    }
    .modal-box {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 20px;
      padding: 24px 20px;
      width: 90%;
      max-width: 320px;
      color: #e0e0e0;
      box-shadow: 0 20px 40px rgba(0,0,0,0.6);
    }
    .modal-title {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 20px;
      text-align: center;
      color: #fff;
    }
    .modal-stat {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid #252525;
    }
    .modal-stat:last-child {
      border-bottom: none;
    }
    .modal-label {
      font-size: 0.9rem;
      color: #aaa;
    }
    .modal-value {
      font-size: 1.1rem;
      font-weight: 600;
      color: #fff;
    }
    .modal-value.positive { color: #4caf50; }
    .modal-value.negative { color: #f44336; }
    .modal-close {
      margin-top: 24px;
      background: #2a2a2a;
      border: none;
      color: #ccc;
      padding: 12px;
      border-radius: 12px;
      width: 100%;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .modal-close:active {
      background: #3a3a3a;
    }
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #141414;
      border-top: 1px solid #252525;
      display: flex;
      padding-bottom: env(safe-area-inset-bottom);
      z-index: 1000;
    }
    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 12px 0;
      color: #666;
      text-decoration: none;
      cursor: pointer;
      transition: color 0.2s;
      border: none;
      background: none;
    }
    .nav-item.active {
      color: #fff;
    }
    .nav-item .nav-icon {
      font-size: 1.5rem;
      margin-bottom: 4px;
    }
    .nav-item .nav-label {
      font-size: 0.7rem;
      font-weight: 500;
    }
    ::-webkit-scrollbar {
      width: 4px;
      height: 4px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: #333;
      border-radius: 2px;
    }
    .top-nav {
      display: flex;
      gap: 10px;
      padding: 15px 0;
    }
    .top-nav-btn {
      flex: 1;
      padding: 14px 20px;
      border: 1px solid #333;
      background: none;
      color: #666;
      cursor: pointer;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 500;
      transition: all 0.2s;
    }
    .top-nav-btn.active {
      background: #333;
      color: #fff;
      border-color: #444;
    }
    .top-nav-btn:active {
      transform: scale(0.98);
    }
    @media (min-width: 768px) {
      body { padding-bottom: 0; }
      .container { max-width: 500px; }
      .bottom-nav { display: none; }
      .chart-container { height: 350px; }
    }
    @media (max-width: 400px) {
      .card-row { flex-direction: column; }
      .trade-header { grid-template-columns: 35px 1fr 60px 70px 60px 40px; font-size: 0.7rem; padding: 8px 10px; }
      .trade-item { grid-template-columns: 35px 1fr 60px 70px 60px 40px; padding: 12px 10px; }
      .trade-pnl { font-size: 0.9rem; }
      .trade-return { font-size: 0.8rem; }
      .trade-balance { font-size: 0.75rem; }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="top-nav">
    <button class="top-nav-btn active" id="topNavManage" onclick="switchPage('manage')">交易管理</button>
    <button class="top-nav-btn" id="topNavData" onclick="switchPage('data')">交易数据</button>
  </div>

  <!-- 交易管理页面 -->
  <div class="page active" id="pageManage">
    <div class="card">
      <div class="card-title">添加单笔交易记录</div>
      <div class="current-balance">
        <div class="label">当前资产</div>
        <div class="value" id="displayBalance">$100,000</div>
      </div>
      <div class="form-group">
        <label>输入方式</label>
        <div class="mode-switch">
          <button class="mode-btn active" id="btnPnl" onclick="setMode('pnl')">盈亏金额</button>
          <button class="mode-btn" id="btnBal" onclick="setMode('balance')">账户余额</button>
        </div>
      </div>
      <div id="groupPnl">
        <div class="form-group">
          <label>输入盈利或亏损金额（二选一）</label>
          <div class="pnl-input-group">
            <div class="pnl-input-item profit">
              <label>盈利金额</label>
              <input type="number" id="inputProfit" placeholder="输入盈利" inputmode="decimal">
            </div>
            <div class="pnl-input-item loss">
              <label>亏损金额</label>
              <span class="loss-prefix">-</span>
              <input type="number" id="inputLoss" placeholder="输入亏损" inputmode="decimal">
            </div>
          </div>
        </div>
      </div>
      <div class="form-group" id="groupBal" style="display:none;">
        <label>交易后账户余额</label>
        <input type="number" id="inputBal" placeholder="输入当前账户余额" inputmode="decimal">
      </div>
      <div class="form-group">
        <label>备注（可选）</label>
        <input type="text" id="inputNote" placeholder="交易备注...">
      </div>
      <button class="btn btn-primary" onclick="addTrade()">添加记录</button>
    </div>

    <div class="card-row">
      <div class="card compact">
        <div class="card-title">初始设置</div>
        <div class="form-group compact">
          <label>初始资产</label>
          <input type="number" id="initialCapital" value="100000" inputmode="decimal" class="compact">
          <div class="hint-text" id="initialHint"></div>
        </div>
        <button class="btn btn-primary compact" id="btnSetInitial" onclick="setInitial()">确认设置</button>
      </div>
      <div class="card compact">
        <div class="card-title">数据管理</div>
        <div class="btn-vertical">
          <button class="btn btn-secondary compact" onclick="exportCSV()">导出数据</button>
          <button class="btn btn-danger compact" onclick="clearAll()">清空数据</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 交易数据页面 -->
  <div class="page" id="pageData">
    <div class="card compact">
      <div class="card-title">交易数据</div>
      <div class="stats-grid">
        <div class="stat-card main">
          <div class="stat-label">当前资产</div>
          <div class="stat-value" id="statCapital">$100,000</div>
        </div>
        <div class="stat-card main">
          <div class="stat-label">总收益率</div>
          <div class="stat-value" id="statReturn">0.00%</div>
        </div>
        <div class="stat-card main">
          <div class="stat-label">总盈亏</div>
          <div class="stat-value" id="statPnl">$0</div>
        </div>
      </div>
      <div class="stats-grid-small">
        <div class="stat-card">
          <div class="stat-label">最大回撤</div>
          <div class="stat-value" id="statDrawdown">0.00%</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">胜率</div>
          <div class="stat-value" id="statWinRate">0.00%</div>
        </div>
        <!-- 盈亏比卡片增加点击类，用于弹出详情 -->
        <div class="stat-card clickable" id="statRatioCard" onclick="openRatioModal()">
          <div class="stat-label">盈亏比</div>
          <div class="stat-value" id="statRatio">-</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">交易次数</div>
          <div class="stat-value" id="statCount">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">平均盈亏</div>
          <div class="stat-value" id="statAvg">$0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">最大连亏</div>
          <div class="stat-value" id="statMaxLoss">0</div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">
        <span>曲线图</span>
        <div class="chart-tabs">
          <button class="chart-tab active" id="tabEquity" onclick="showChart('equity')">资产</button>
          <button class="chart-tab" id="tabReturn" onclick="showChart('return')">收益率</button>
        </div>
      </div>
      <div class="chart-container" id="chartBox">
        <canvas id="chartCanvas"></canvas>
        <div class="chart-tooltip" id="tooltip">
          <div class="tt-label"></div>
          <div class="tt-value"></div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">交易记录</div>
      <div class="trade-header" id="tradeHeader" style="display: none;">
        <span>#</span><span>盈亏</span><span>收益率</span><span>余额</span><span>备注</span><span>操作</span>
      </div>
      <div class="trade-list" id="tradeList">
        <div class="empty-state"><div class="empty-state-icon">📊</div><div class="empty-state-text">暂无交易记录</div></div>
      </div>
    </div>
  </div>
</div>

<!-- 盈亏比详情弹窗 -->
<div class="modal-overlay" id="ratioModal">
  <div class="modal-box">
    <div class="modal-title">📈 盈亏分析</div>
    <div class="modal-stat">
      <span class="modal-label">期望值</span>
      <span class="modal-value" id="modalExpectancy">-</span>
    </div>
    <div class="modal-stat">
      <span class="modal-label">平均盈利</span>
      <span class="modal-value positive" id="modalAvgWin">$0</span>
    </div>
    <div class="modal-stat">
      <span class="modal-label">平均亏损</span>
      <span class="modal-value negative" id="modalAvgLoss">$0</span>
    </div>
    <button class="modal-close" onclick="closeRatioModal()">关闭</button>
  </div>
</div>

<script>
  (function() {
    var initial = 100000;
    var trades = [];
    var mode = 'pnl';
    var chartType = 'equity';
    var initialLocked = false;
    var chartPoints = [];
    var currentPage = 'manage';

    function init() {
      load();
      updateInitialUI();
      render();
      bindChartEvents();
      bindPnlInputEvents();
      // 点击遮罩关闭弹窗
      document.getElementById('ratioModal').addEventListener('click', function(e) {
        if (e.target === this) closeRatioModal();
      });
    }

    function bindPnlInputEvents() {
      var profitInput = document.getElementById('inputProfit');
      var lossInput = document.getElementById('inputLoss');
      profitInput.addEventListener('input', function() { if (this.value !== '') lossInput.value = ''; });
      lossInput.addEventListener('input', function() { if (this.value !== '') profitInput.value = ''; });
    }

    window.switchPage = function(page) {
      currentPage = page;
      document.getElementById('pageManage').classList.toggle('active', page === 'manage');
      document.getElementById('pageData').classList.toggle('active', page === 'data');
      document.getElementById('topNavManage').classList.toggle('active', page === 'manage');
      document.getElementById('topNavData').classList.toggle('active', page === 'data');
      if (page === 'data') setTimeout(drawChart, 50);
      window.scrollTo(0, 0);
    };

    function updateInitialUI() {
      var input = document.getElementById('initialCapital');
      var btn = document.getElementById('btnSetInitial');
      var hint = document.getElementById('initialHint');
      if (initialLocked) {
        input.disabled = true;
        btn.disabled = true;
        hint.textContent = '清空数据后可重新设置';
      } else {
        input.disabled = false;
        btn.disabled = false;
        hint.textContent = '';
      }
    }

    window.setMode = function(m) {
      mode = m;
      document.getElementById('btnPnl').className = m === 'pnl' ? 'mode-btn active' : 'mode-btn';
      document.getElementById('btnBal').className = m === 'balance' ? 'mode-btn active' : 'mode-btn';
      document.getElementById('groupPnl').style.display = m === 'pnl' ? 'block' : 'none';
      document.getElementById('groupBal').style.display = m === 'balance' ? 'block' : 'none';
    };

    window.showChart = function(type) {
      chartType = type;
      document.getElementById('tabEquity').className = type === 'equity' ? 'chart-tab active' : 'chart-tab';
      document.getElementById('tabReturn').className = type === 'return' ? 'chart-tab active' : 'chart-tab';
      drawChart();
    };

    window.setInitial = function() {
      if (initialLocked) return;
      var val = parseFloat(document.getElementById('initialCapital').value);
      if (isNaN(val) || val <= 0) { alert('请输入有效的初始资产'); return; }
      initial = val;
      initialLocked = true;
      updateInitialUI();
      save();
      render();
    };

    function getBalance() {
      var bal = initial;
      for (var i = 0; i < trades.length; i++) bal += trades[i].pnl;
      return bal;
    }

    window.addTrade = function() {
      if (!initialLocked) { alert('请先确认设置初始资产'); return; }
      var pnl, currentBal = getBalance();
      if (mode === 'pnl') {
        var profitVal = document.getElementById('inputProfit').value;
        var lossVal = document.getElementById('inputLoss').value;
        if (profitVal !== '' && !isNaN(parseFloat(profitVal))) pnl = Math.abs(parseFloat(profitVal));
        else if (lossVal !== '' && !isNaN(parseFloat(lossVal))) pnl = -Math.abs(parseFloat(lossVal));
        else { alert('请输入盈利金额或亏损金额'); return; }
      } else {
        var v = document.getElementById('inputBal').value;
        if (v === '' || isNaN(parseFloat(v))) { alert('请输入有效的账户余额'); return; }
        pnl = parseFloat(v) - currentBal;
      }
      trades.push({ id: Date.now(), pnl: pnl, note: document.getElementById('inputNote').value.trim(), before: currentBal });
      document.getElementById('inputProfit').value = '';
      document.getElementById('inputLoss').value = '';
      document.getElementById('inputBal').value = '';
      document.getElementById('inputNote').value = '';
      document.activeElement.blur();
      save();
      render();
      showToast('记录已添加');
    };

    function showToast(msg) {
      var toast = document.createElement('div');
      toast.textContent = msg;
      toast.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#333;color:#fff;padding:12px 24px;border-radius:10px;z-index:9999;font-size:0.9rem;';
      document.body.appendChild(toast);
      setTimeout(function() { toast.style.transition = 'opacity 0.3s'; toast.style.opacity = '0'; setTimeout(function() { toast.remove(); }, 300); }, 1500);
    }

    window.deleteTrade = function(id) {
      if (!confirm('确定删除此笔交易记录？')) return;
      var newTrades = [];
      for (var i = 0; i < trades.length; i++) if (trades[i].id !== id) newTrades.push(trades[i]);
      trades = newTrades;
      recalc();
      save();
      render();
    };

    function recalc() {
      var bal = initial;
      for (var i = 0; i < trades.length; i++) { trades[i].before = bal; bal += trades[i].pnl; }
    }

    function getStats() {
      var s = {
        capital: initial, totalPnl: 0, totalReturn: 0, maxDD: 0, winRate: 0,
        ratio: 0, count: trades.length, avg: 0, maxConsecLoss: 0,
        equity: [initial], returns: [0],
        avgWin: 0, avgLoss: 0, winCount: 0, lossCount: 0
      };
      if (trades.length === 0) return s;
      var bal = initial, peak = initial;
      var wins = 0, losses = 0, winSum = 0, lossSum = 0;
      var consec = 0, maxConsec = 0;
      for (var i = 0; i < trades.length; i++) {
        var t = trades[i];
        bal += t.pnl;
        s.equity.push(bal);
        s.returns.push((bal - initial) / initial * 100);
        if (t.pnl > 0) { wins++; winSum += t.pnl; consec = 0; }
        else if (t.pnl < 0) { losses++; lossSum += Math.abs(t.pnl); consec++; if (consec > maxConsec) maxConsec = consec; }
        else { consec = 0; }
        if (bal > peak) peak = bal;
        var dd = peak > 0 ? (peak - bal) / peak : 0;
        if (dd > s.maxDD) s.maxDD = dd;
      }
      s.capital = bal;
      s.totalPnl = bal - initial;
      s.totalReturn = (s.totalPnl / initial) * 100;
      s.maxDD = s.maxDD * 100;
      s.winRate = trades.length > 0 ? (wins / trades.length) * 100 : 0;
      s.avg = trades.length > 0 ? s.totalPnl / trades.length : 0;
      s.maxConsecLoss = maxConsec;
      s.winCount = wins;
      s.lossCount = losses;
      s.avgWin = wins > 0 ? winSum / wins : 0;
      s.avgLoss = losses > 0 ? lossSum / losses : 0;
      s.ratio = s.avgLoss > 0 ? s.avgWin / s.avgLoss : (s.avgWin > 0 ? Infinity : 0);
      return s;
    }

    function fmt(v) {
      var prefix = v >= 0 ? '$' : '-$';
      return prefix + Math.abs(v).toLocaleString('en-US', {maximumFractionDigits: 0});
    }

    function render() {
      var s = getStats();
      document.getElementById('displayBalance').textContent = fmt(s.capital);
      document.getElementById('statCapital').textContent = fmt(s.capital);
      var retEl = document.getElementById('statReturn');
      retEl.textContent = s.totalReturn.toFixed(2) + '%';
      retEl.className = 'stat-value ' + (s.totalReturn >= 0 ? 'positive' : 'negative');
      var pnlEl = document.getElementById('statPnl');
      pnlEl.textContent = (s.totalPnl >= 0 ? '+' : '') + fmt(s.totalPnl);
      pnlEl.className = 'stat-value ' + (s.totalPnl >= 0 ? 'positive' : 'negative');
      var ddEl = document.getElementById('statDrawdown');
      ddEl.textContent = s.maxDD.toFixed(2) + '%';
      ddEl.className = 'stat-value' + (s.maxDD > 0 ? ' negative' : '');
      document.getElementById('statWinRate').textContent = s.winRate.toFixed(2) + '%';
      var ratioEl = document.getElementById('statRatio');
      ratioEl.textContent = s.ratio === Infinity ? '∞' : (s.ratio === 0 && trades.length === 0 ? '-' : s.ratio.toFixed(2));
      document.getElementById('statCount').textContent = s.count;
      var avgEl = document.getElementById('statAvg');
      avgEl.textContent = (s.avg >= 0 ? '+' : '') + fmt(s.avg);
      avgEl.className = 'stat-value ' + (s.avg >= 0 ? 'positive' : 'negative');
      document.getElementById('statMaxLoss').textContent = s.maxConsecLoss;
      if (currentPage === 'data') drawChart();
      renderTradeList();
    }

    function drawChart() {
      var canvas = document.getElementById('chartCanvas');
      var ctx = canvas.getContext('2d');
      var container = document.getElementById('chartBox');
      var dpr = window.devicePixelRatio || 1;
      var rect = container.getBoundingClientRect();
      canvas.width = rect.width * dpr;
      canvas.height = rect.height * dpr;
      canvas.style.width = rect.width + 'px';
      canvas.style.height = rect.height + 'px';
      ctx.scale(dpr, dpr);
      var s = getStats();
      var data = chartType === 'equity' ? s.equity : s.returns;
      var threshold = chartType === 'equity' ? initial : 0;
      var w = rect.width, h = rect.height;
      var pad = {t:20, r:15, b:30, l:60};
      var cw = w - pad.l - pad.r, ch = h - pad.t - pad.b;
      ctx.clearRect(0,0,w,h);
      chartPoints = [];
      if (data.length < 1) {
        ctx.fillStyle = '#444'; ctx.font = '14px sans-serif'; ctx.textAlign = 'center';
        ctx.fillText('暂无数据', w/2, h/2); return;
      }
      var minV = Math.min.apply(null, data), maxV = Math.max.apply(null, data);
      var range = maxV - minV || 1;
      var yMin = minV - range * 0.1, yMax = maxV + range * 0.1;
      ctx.strokeStyle = '#1e1e1e'; ctx.lineWidth = 1;
      for (var i=0; i<=4; i++) {
        var y = pad.t + (ch/4)*i;
        ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(w-pad.r, y); ctx.stroke();
        var val = yMax - ((yMax-yMin)/4)*i;
        ctx.fillStyle = '#555'; ctx.font = '11px sans-serif'; ctx.textAlign = 'right';
        ctx.fillText(chartType==='equity'?fmt(val):val.toFixed(1)+'%', pad.l-8, y+4);
      }
      if (yMin < threshold && yMax > threshold) {
        var ty = pad.t + ch * ((yMax-threshold)/(yMax-yMin));
        ctx.strokeStyle = '#333'; ctx.setLineDash([4,4]);
        ctx.beginPath(); ctx.moveTo(pad.l, ty); ctx.lineTo(w-pad.r, ty); ctx.stroke();
        ctx.setLineDash([]);
      }
      var step = Math.max(1, Math.floor(data.length/6));
      ctx.fillStyle = '#555'; ctx.font = '11px sans-serif'; ctx.textAlign = 'center';
      for (var i=0; i<data.length; i+=step) {
        var x = pad.l + (cw/Math.max(data.length-1,1))*i;
        ctx.fillText(i.toString(), x, h-10);
      }
      var pts = [];
      for (var i=0; i<data.length; i++) {
        var x = pad.l + (cw/Math.max(data.length-1,1))*i;
        var y = pad.t + ch * ((yMax-data[i])/(yMax-yMin));
        pts.push({x:x, y:y, val:data[i], idx:i});
        chartPoints.push({x:x, y:y, val:data[i], idx:i});
      }
      var lastVal = data[data.length-1];
      var color = lastVal >= threshold ? '#4caf50' : '#f44336';
      ctx.beginPath(); ctx.moveTo(pts[0].x, pad.t+ch);
      for (var i=0; i<pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
      ctx.lineTo(pts[pts.length-1].x, pad.t+ch); ctx.closePath();
      ctx.fillStyle = color; ctx.globalAlpha = 0.15; ctx.fill(); ctx.globalAlpha = 1;
      ctx.beginPath(); ctx.moveTo(pts[0].x, pts[0].y);
      for (var i=1; i<pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
      ctx.strokeStyle = color; ctx.lineWidth = 2.5; ctx.stroke();
      for (var i=0; i<pts.length; i++) {
        ctx.beginPath(); ctx.arc(pts[i].x, pts[i].y, 5, 0, Math.PI*2);
        ctx.fillStyle = color; ctx.fill(); ctx.strokeStyle = '#141414'; ctx.lineWidth = 2; ctx.stroke();
      }
    }

    function bindChartEvents() {
      var canvas = document.getElementById('chartCanvas');
      var tooltip = document.getElementById('tooltip');
      function showTooltipAt(clientX, clientY) {
        var rect = canvas.getBoundingClientRect();
        var mx = clientX - rect.left, my = clientY - rect.top;
        var found = null, minDist = 40;
        for (var i=0; i<chartPoints.length; i++) {
          var p = chartPoints[i];
          var dist = Math.sqrt((mx-p.x)*(mx-p.x)+(my-p.y)*(my-p.y));
          if (dist < minDist) { minDist = dist; found = p; }
        }
        if (found) {
          var label = chartType==='equity'?'资产余额':'累计收益率';
          var value = chartType==='equity'?fmt(found.val):found.val.toFixed(2)+'%';
          tooltip.querySelector('.tt-label').textContent = '第 '+found.idx+' 笔 · '+label;
          tooltip.querySelector('.tt-value').textContent = value;
          var tx = found.x+15, ty = found.y-50;
          if (tx+120 > document.getElementById('chartBox').clientWidth) tx = found.x-130;
          if (ty < 0) ty = found.y+15;
          tooltip.style.left = tx+'px'; tooltip.style.top = ty+'px';
          tooltip.classList.add('show');
        } else { tooltip.classList.remove('show'); }
      }
      canvas.addEventListener('mousemove', function(e) { showTooltipAt(e.clientX, e.clientY); });
      canvas.addEventListener('mouseleave', function() { tooltip.classList.remove('show'); });
      canvas.addEventListener('touchstart', function(e) { if(e.touches.length===1) showTooltipAt(e.touches[0].clientX, e.touches[0].clientY); }, {passive:true});
      canvas.addEventListener('touchmove', function(e) { if(e.touches.length===1) showTooltipAt(e.touches[0].clientX, e.touches[0].clientY); }, {passive:true});
      canvas.addEventListener('touchend', function() { setTimeout(function(){ tooltip.classList.remove('show'); }, 2000); });
    }

    function renderTradeList() {
      var container = document.getElementById('tradeList');
      var header = document.getElementById('tradeHeader');
      if (trades.length === 0) {
        header.style.display = 'none';
        container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📊</div><div class="empty-state-text">暂无交易记录</div></div>';
        return;
      }
      header.style.display = 'grid';
      var html = '';
      var balances = [], bal = initial;
      for (var i=0; i<trades.length; i++) { bal += trades[i].pnl; balances.push(bal); }
      for (var i=trades.length-1; i>=0; i--) {
        var t = trades[i];
        var before = t.before !== undefined ? t.before : (i===0 ? initial : balances[i-1]);
        var after = balances[i];
        var ret = before > 0 ? (t.pnl / before * 100) : 0;
        var cls = t.pnl >= 0 ? 'profit' : 'loss';
        html += '<div class="trade-item">';
        html += '<div class="trade-num">'+(i+1)+'</div>';
        html += '<div class="trade-pnl '+cls+'">'+(t.pnl>=0?'+':'')+fmt(t.pnl)+'</div>';
        html += '<div class="trade-return '+cls+'">'+(ret>=0?'+':'')+ret.toFixed(2)+'%</div>';
        html += '<div class="trade-balance">'+fmt(after)+'</div>';
        html += '<div class="trade-note">'+(t.note||'-')+'</div>';
        html += '<button class="delete-btn" onclick="deleteTrade('+t.id+')">×</button>';
        html += '</div>';
      }
      container.innerHTML = html;
    }

    // 打开盈亏比弹窗，计算期望值
    window.openRatioModal = function() {
      var s = getStats();
      var avgWin = s.avgWin;
      var avgLoss = s.avgLoss;
      var winRate = s.winRate / 100;
      var lossRate = 1 - winRate;
      var expectancy = (winRate * avgWin) - (lossRate * avgLoss);
      
      document.getElementById('modalAvgWin').textContent = fmt(avgWin);
      document.getElementById('modalAvgLoss').textContent = fmt(avgLoss);
      var expEl = document.getElementById('modalExpectancy');
      expEl.textContent = fmt(expectancy);
      expEl.className = 'modal-value ' + (expectancy >= 0 ? 'positive' : 'negative');
      
      document.getElementById('ratioModal').classList.add('active');
    };

    window.closeRatioModal = function() {
      document.getElementById('ratioModal').classList.remove('active');
    };

    function save() {
      localStorage.setItem('tradeData', JSON.stringify({ initial: initial, trades: trades, locked: initialLocked }));
    }

    function load() {
      try {
        var d = localStorage.getItem('tradeData');
        if (d) {
          var obj = JSON.parse(d);
          initial = obj.initial || 100000;
          trades = obj.trades || [];
          initialLocked = obj.locked || false;
          document.getElementById('initialCapital').value = initial;
          recalc();
        }
      } catch(e) {}
    }

    window.exportCSV = function() {
      var s = getStats();
      var csv = '交易记录分析报告\n\n初始资产,'+initial+'\n当前资产,'+s.capital+'\n总收益率,'+s.totalReturn.toFixed(2)+'%\n';
      csv += '总盈亏,'+s.totalPnl+'\n最大回撤,'+s.maxDD.toFixed(2)+'%\n胜率,'+s.winRate.toFixed(2)+'%\n';
      csv += '盈亏比,'+(s.ratio===Infinity?'无穷大':s.ratio.toFixed(2))+'\n交易次数,'+s.count+'\n最大连续亏损,'+s.maxConsecLoss+'\n\n';
      csv += '序号,盈亏,本次收益率,余额,备注\n';
      var bal = initial;
      for (var i=0; i<trades.length; i++) {
        var t = trades[i];
        var before = t.before !== undefined ? t.before : bal;
        bal = before + t.pnl;
        var ret = before > 0 ? (t.pnl/before*100).toFixed(2) : '0.00';
        csv += (i+1)+','+t.pnl+','+ret+'%,'+bal+','+(t.note||'')+'\n';
      }
      var blob = new Blob(['\ufeff'+csv], {type:'text/csv;charset=utf-8;'});
      var link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = '交易记录.csv';
      link.click();
      showToast('导出成功');
    };

    window.clearAll = function() {
      if (confirm('确定清空所有数据？此操作不可恢复。')) {
        trades = [];
        initialLocked = false;
        updateInitialUI();
        save();
        render();
        showToast('数据已清空');
      }
    };

    var resizeTimer;
    window.addEventListener('resize', function() {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(function() { if (currentPage === 'data') drawChart(); }, 100);
    });
    window.addEventListener('orientationchange', function() {
      setTimeout(function() { if (currentPage === 'data') drawChart(); }, 300);
    });
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        var id = document.activeElement.id;
        if (id === 'inputProfit' || id === 'inputLoss' || id === 'inputBal' || id === 'inputNote') addTrade();
      }
    });

    init();
  })();
</script>
</body>
</html>
